<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Dashboard · Dernières mises à jour</title>
    
    <!-- REDIRECTION MOBILE -->
    <script>
        if (window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.href = "tel.html";
        }
    </script>

    <!-- Inter font + icônes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Données des versions -->
    <script src="versions-data.js"></script>
    <!-- Configuration des comptes -->
    <script src="pdp.js"></script>
    <!-- Version automatique -->
    <script src="version.js"></script>
    
    <style>
        /* (Garder tout le style existant de version.html) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1219;
            font-family: 'Inter', sans-serif;
            color: #e6edf3;
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 25% 30%, rgba(130, 196, 168, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 75% 70%, rgba(130, 196, 168, 0.03) 0%, transparent 30%),
                repeating-linear-gradient(45deg, rgba(53, 79, 92, 0.1) 0px, rgba(53, 79, 92, 0.1) 2px, transparent 2px, transparent 8px);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 0.75rem 1.5rem;
            background: rgba(18, 28, 36, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(130, 196, 168, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .logo i {
            color: #82c4a8;
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: #a0b8c7;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: rgba(130, 196, 168, 0.1);
            color: #e6edf3;
        }

        .nav-link.active {
            background: #82c4a8;
            color: #0b1219;
        }

        /* En-tête */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #82c4a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(130, 196, 168, 0.1);
            border: 1px solid rgba(130, 196, 168, 0.3);
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            color: #82c4a8;
            font-weight: 600;
        }

        /* Timeline */
        .timeline {
            background: rgba(22, 34, 43, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid rgba(130, 196, 168, 0.2);
            margin-bottom: 2rem;
        }

        .timeline-item {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(53, 79, 92, 0.3);
            position: relative;
        }

        .timeline-item:last-child {
            border-bottom: none;
        }

        .timeline-date {
            min-width: 100px;
            font-weight: 600;
            color: #82c4a8;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .version-tag {
            background: rgba(130, 196, 168, 0.2);
            border: 1px solid rgba(130, 196, 168, 0.3);
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #82c4a8;
        }

        .timeline-desc {
            color: #a0b8c7;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .timeline-desc ul {
            margin-top: 0.5rem;
            margin-left: 1.5rem;
        }

        .timeline-desc li {
            margin-bottom: 0.3rem;
        }

        .timeline-desc i {
            color: #82c4a8;
            width: 20px;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-new {
            background: #4bc0c0;
            color: #0b1219;
        }

        .badge-update {
            background: #ffb347;
            color: #0b1219;
        }

        .badge-fix {
            background: #ff8c8c;
            color: #0b1219;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(22, 34, 43, 0.5);
            border: 1px solid rgba(130, 196, 168, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #82c4a8;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            color: #a0b8c7;
            font-size: 0.85rem;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0 0;
            border-top: 1px solid rgba(53, 79, 92, 0.3);
            font-size: 0.85rem;
            color: #6d8f9f;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            color: #a0b8c7;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #82c4a8;
        }

        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .timeline-item {
                flex-direction: column;
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="nav-bar">
            <div class="logo">
                <i class="fas fa-chess-knight"></i>
                <span>ChessDashboard</span>
            </div>
            <div class="nav-links">
                <a href="accueil.html" class="nav-link">Accueil</a>
                <a href="classement.html" class="nav-link">Leaderboard</a>
                <a href="a-venir.html" class="nav-link">À venir</a>
                <a href="apropos.html" class="nav-link">À propos</a>
                <a href="#" class="nav-link active">Mises à jour</a>
            </div>
        </nav>

        <!-- En-tête avec version automatique -->
        <div class="page-header">
            <h1>Dernières mises à jour</h1>
            <div class="version-badge" id="versionDisplay">
                <i class="fas fa-code-branch"></i>
                <span>Chargement...</span>
            </div>
        </div>

        <!-- Statistiques -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalUpdates">...</div>
                <div class="stat-label">Mises à jour</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastUpdateDate">...</div>
                <div class="stat-label">Dernière mise à jour</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAccounts">...</div>
                <div class="stat-label">Comptes actifs</div>
            </div>
        </div>

        <!-- Timeline des versions -->
        <div class="timeline" id="timeline">
            <div style="text-align: center; padding: 2rem;">
                <i class="fas fa-spinner fa-spin"></i> Chargement des versions...
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div><i class="fa-regular fa-copyright"></i> AlphaRomo604 · <span id="footerVersion">V2.6.1</span> · 2026</div>
            <div class="footer-links">
                <a href="#" onclick="location.reload()">Rafraîchir</a>
                <a href="https://github.com/Alpha604/Objectif" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>

    <script>
        // ==============================================
        // CODE PRINCIPAL DE VERSION.HTML
        // Utilise les données de versions-data.js
        // ==============================================

        // Attendre que les données soient chargées
        function initVersionPage() {
            console.log("Initialisation de version.html");
            
            // Vérifier que VERSIONS_DATA est disponible
            if (typeof VERSIONS_DATA === 'undefined') {
                console.error("VERSIONS_DATA non trouvé !");
                document.getElementById('timeline').innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: #ff6b6b;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>Erreur de chargement des données</p>
                    </div>
                `;
                return;
            }

            // Mettre à jour les statistiques
            updateStats();
            
            // Générer la timeline
            generateTimeline();
        }

        // Mettre à jour les statistiques
        function updateStats() {
            const totalUpdates = VERSIONS_DATA.history.length;
            const lastUpdate = VERSIONS_DATA.formatDate(VERSIONS_DATA.history[0].date);
            
            // Compter les comptes actifs
            let activeAccounts = 4; // Valeur par défaut
            if (typeof ACCOUNTS !== 'undefined') {
                activeAccounts = ACCOUNTS.filter(a => a.status === 'active').length;
            }
            
            document.getElementById('totalUpdates').textContent = totalUpdates;
            document.getElementById('lastUpdateDate').textContent = lastUpdate;
            document.getElementById('totalAccounts').textContent = activeAccounts;
        }

        // Générer la timeline HTML
        function generateTimeline() {
            const timeline = document.getElementById('timeline');
            
            timeline.innerHTML = VERSIONS_DATA.history.map(item => {
                const formattedDate = VERSIONS_DATA.formatDate(item.date);
                const badge = VERSIONS_DATA.getTypeBadge(item.type);
                
                return `
                    <div class="timeline-item">
                        <div class="timeline-date">${formattedDate}</div>
                        <div class="timeline-content">
                            <div class="timeline-title">
                                ${item.title}
                                <span class="version-tag">${item.version}</span>
                                ${badge}
                            </div>
                            <div class="timeline-desc">
                                <ul>
                                    ${item.changes.map(change => 
                                        `<li><i class="fas fa-chevron-right"></i> ${change}</li>`
                                    ).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Lancer au chargement
        document.addEventListener('DOMContentLoaded', initVersionPage);
    </script>
</body>
</html>
