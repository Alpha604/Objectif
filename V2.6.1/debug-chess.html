<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Debug Chess.com API</title>
    <style>
        body { background: #0b1219; color: #e6edf3; font-family: Inter, sans-serif; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #1e2c34; border-radius: 16px; padding: 2rem; margin-bottom: 1rem; }
        button { background: #82c4a8; color: #0b1219; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        pre { background: #0b1219; padding: 1rem; border-radius: 8px; overflow: auto; max-height: 400px; }
        .success { color: #82c4a8; }
        .error { color: #ff6b6b; }
        .log { border-bottom: 1px solid #354f5c; padding: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Debug Chess.com API</h1>
        
        <div class="card">
            <h2>Test avec le même code que le site</h2>
            <input type="text" id="username" value="alpharomo604" placeholder="Nom d'utilisateur" style="padding: 8px; margin-right: 10px;">
            <button onclick="testWithOurCode()">Tester avec notre code</button>
            <button onclick="testDirect()">Test direct</button>
            <button onclick="clearLogs()">Effacer les logs</button>
            
            <div id="logs" style="margin-top: 20px; background: #0b1219; padding: 10px; border-radius: 8px; max-height: 500px; overflow: auto;"></div>
        </div>
    </div>

    <script>
    // Notre code de chess-api.js
    const PROXIES = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://thingproxy.freeboard.io/fetch/'
    ];
    
    function addLog(message, type = 'info') {
        const logs = document.getElementById('logs');
        const logEntry = document.createElement('div');
        logEntry.className = 'log';
        logEntry.style.color = type === 'error' ? '#ff6b6b' : (type === 'success' ? '#82c4a8' : '#a0b8c7');
        logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logs.appendChild(logEntry);
        logs.scrollTop = logs.scrollHeight;
        console.log(message);
    }
    
    async function testWithOurCode() {
        const username = document.getElementById('username').value;
        addLog(`🔍 Test pour ${username}...`);
        
        for (const proxy of PROXIES) {
            try {
                addLog(`Tentative avec proxy: ${proxy}`);
                
                const url = `${proxy}${encodeURIComponent(`https://api.chess.com/pub/player/${username}/stats`)}`;
                addLog(`URL: ${url}`);
                
                const response = await fetch(url);
                addLog(`Status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    addLog(`✅ Succès avec ${proxy}`, 'success');
                    addLog(`Données reçues: ${JSON.stringify(data).substring(0, 200)}...`, 'success');
                    
                    // Afficher les ELO
                    if (data.chess_bullet) {
                        addLog(`Bullet: ${data.chess_bullet.last.rating}`, 'success');
                    }
                    if (data.chess_blitz) {
                        addLog(`Blitz: ${data.chess_blitz.last.rating}`, 'success');
                    }
                    if (data.chess_rapid) {
                        addLog(`Rapide: ${data.chess_rapid.last.rating}`, 'success');
                    }
                    
                    return;
                } else {
                    addLog(`❌ Proxy ${proxy} a échoué avec status ${response.status}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Proxy ${proxy} a échoué: ${error.message}`, 'error');
            }
        }
        
        addLog('❌ Tous les proxies ont échoué', 'error');
    }
    
    async function testDirect() {
        const username = document.getElementById('username').value;
        addLog(`🔍 Test direct sans proxy pour ${username}...`);
        
        try {
            const response = await fetch(`https://api.chess.com/pub/player/${username}/stats`);
            addLog(`Status: ${response.status}`);
            
            if (response.ok) {
                const data = await response.json();
                addLog(`✅ Succès sans proxy !`, 'success');
                addLog(`Données: ${JSON.stringify(data).substring(0, 200)}...`, 'success');
            } else {
                addLog(`❌ Échec: ${response.status} - ${response.statusText}`, 'error');
            }
        } catch (error) {
            addLog(`❌ Erreur: ${error.message}`, 'error');
        }
    }
    
    function clearLogs() {
        document.getElementById('logs').innerHTML = '';
    }
    </script>
</body>
</html>
