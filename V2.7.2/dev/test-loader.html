<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Loader · Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1219;
            font-family: 'Inter', sans-serif;
            color: #e6edf3;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff, #82c4a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0b8c7;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(53, 79, 92, 0.3);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            border: 1px solid #354f5c;
            background: #1e2c34;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            border-color: #82c4a8;
        }

        button.primary {
            background: #82c4a8;
            color: #0b1219;
            border: none;
            font-weight: 600;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(22, 34, 43, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(130, 196, 168, 0.2);
        }

        .card h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #82c4a8;
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(53, 79, 92, 0.3);
        }

        .log-container {
            background: #1a2a33;
            border-radius: 16px;
            padding: 1rem;
            height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            border: 1px solid #253b47;
        }

        .log-entry {
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(53, 79, 92, 0.2);
            color: #a0b8c7;
        }

        .log-success {
            color: #82c4a8;
        }

        .log-error {
            color: #ff6b6b;
        }

        .log-warning {
            color: #ffb347;
        }

        .log-info {
            color: #4bc0c0;
        }

        .timestamp {
            color: #6d8f9f;
            margin-right: 0.5rem;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-active {
            background: #82c4a8;
            box-shadow: 0 0 10px #82c4a8;
        }

        .status-blocked {
            background: #ff6b6b;
        }

        .status-loading {
            background: #ffb347;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1f313c;
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background: #82c4a8;
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #253b47;
        }

        .footer {
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(53, 79, 92, 0.3);
            color: #6d8f9f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-spinner"></i> Test Loader</h1>
        <div class="subtitle">Test du système de chargement des comptes et scripts</div>

        <div class="controls">
            <button class="primary" onclick="testNormalLoad()">
                <i class="fas fa-play"></i> Test chargement normal
            </button>
            <button onclick="testOnlineLoad()">
                <i class="fas fa-cloud"></i> Test mode online
            </button>
            <button onclick="testErrorLoad()">
                <i class="fas fa-exclamation-triangle"></i> Test erreur
            </button>
            <button onclick="clearLogs()">
                <i class="fas fa-trash"></i> Effacer logs
            </button>
            <button onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Retour
            </button>
        </div>

        <div class="test-grid">
            <!-- Logs -->
            <div class="card">
                <h3><i class="fas fa-terminal"></i> Console de logs</h3>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="timestamp">⏱️</span> Prêt pour les tests...
                    </div>
                </div>
            </div>

            <!-- Statistiques -->
            <div class="card">
                <h3><i class="fas fa-chart-pie"></i> Statistiques</h3>
                <div style="margin-bottom: 1rem;">
                    <div class="stats-row">
                        <span>Scripts chargés</span>
                        <span id="statsScripts">0</span>
                    </div>
                    <div class="stats-row">
                        <span>Comptes actifs</span>
                        <span id="statsActive">0</span>
                    </div>
                    <div class="stats-row">
                        <span>Comptes bloqués</span>
                        <span id="statsBlocked">0</span>
                    </div>
                    <div class="stats-row">
                        <span>Mode online</span>
                        <span id="statsOnline">0</span>
                    </div>
                    <div class="stats-row">
                        <span>Dernier chargement</span>
                        <span id="statsLast">-</span>
                    </div>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div style="text-align: center; color: #a0b8c7;" id="progressText">
                    0% chargé
                </div>
            </div>
        </div>

        <!-- Testeurs individuels -->
        <div class="card" style="margin-bottom: 2rem;">
            <h3><i class="fas fa-flask"></i> Tests individuels</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                <button onclick="testScript('pdp.js')">📁 pdp.js</button>
                <button onclick="testScript('chess-api.js')">🌐 chess-api.js</button>
                <button onclick="testScript('version.js')">🔖 version.js</button>
                <button onclick="testScript('loader.js')">⚙️ loader.js</button>
                <button onclick="testDataFile('alpha604')">📊 data.js (Alpha)</button>
                <button onclick="testDataFile('karen')">📊 data-karen.js</button>
                <button onclick="testAppFile('alpha604')">🎯 app.js (Alpha)</button>
                <button onclick="testAppFile('karen')">🎯 app-karen.js</button>
            </div>
        </div>

        <!-- Statut des comptes -->
        <div class="card">
            <h3><i class="fas fa-users"></i> Statut des comptes</h3>
            <div id="accountsStatus"></div>
        </div>

        <div class="footer">
            <div><i class="fa-regular fa-copyright"></i> Espace Dev · Test Loader</div>
            <div>
                <span id="memoryUsage"></span>
            </div>
        </div>
    </div>

    <script src="../pdp.js"></script>
    <script>
        // Variables
        let logs = [];
        let loadedScripts = [];
        let progress = 0;

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            displayAccountsStatus();
            addLog('✅ Système de test initialisé', 'success');
        });

        // Ajouter un log
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            let colorClass = 'log-info';
            if (type === 'success') colorClass = 'log-success';
            if (type === 'error') colorClass = 'log-error';
            if (type === 'warning') colorClass = 'log-warning';
            
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${colorClass}`;
            logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            
            container.appendChild(logEntry);
            container.scrollTop = container.scrollHeight;
            
            logs.push({ timestamp, message, type });
        }

        // Mettre à jour les stats
        function updateStats() {
            if (typeof ACCOUNTS === 'undefined') return;
            
            const active = ACCOUNTS.filter(a => a.status === 'active').length;
            const blocked = ACCOUNTS.filter(a => a.status === 'blocked').length;
            const online = ACCOUNTS.filter(a => a.source === 'online').length;
            
            document.getElementById('statsActive').textContent = active;
            document.getElementById('statsBlocked').textContent = blocked;
            document.getElementById('statsOnline').textContent = online;
            document.getElementById('statsScripts').textContent = loadedScripts.length;
            
            // Mémoire (estimation)
            if (window.performance && window.performance.memory) {
                const mem = (window.performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(2);
                document.getElementById('memoryUsage').textContent = `💾 ${mem} MB`;
            }
        }

        // Mettre à jour la progression
        function updateProgress(value) {
            progress = value;
            document.getElementById('progressFill').style.width = `${value}%`;
            document.getElementById('progressText').textContent = `${value}% chargé`;
        }

        // Test chargement normal
        async function testNormalLoad() {
            addLog('🚀 Début test chargement normal', 'info');
            updateProgress(10);
            
            try {
                // Simuler loader.js
                addLog('📂 Chargement de pdp.js...', 'info');
                await loadScript('../pdp.js');
                loadedScripts.push('pdp.js');
                updateProgress(30);
                
                addLog('📂 Chargement de chess-api.js...', 'info');
                await loadScript('../chess-api.js');
                loadedScripts.push('chess-api.js');
                updateProgress(50);
                
                addLog('📂 Chargement de version.js...', 'info');
                await loadScript('../version.js');
                loadedScripts.push('version.js');
                updateProgress(70);
                
                addLog('📂 Chargement de loader.js...', 'info');
                await loadScript('../loader.js');
                loadedScripts.push('loader.js');
                updateProgress(90);
                
                addLog('✅ Tous les scripts chargés avec succès', 'success');
                updateProgress(100);
                
            } catch (error) {
                addLog(`❌ Erreur: ${error.message}`, 'error');
                updateProgress(0);
            }
            
            updateStats();
        }

        // Test mode online
        async function testOnlineLoad() {
            addLog('🌐 Test mode online pour alpha604', 'info');
            
            if (typeof loadAccountDataWithSource === 'function') {
                try {
                    const account = ACCOUNTS.find(a => a.id === 'alpha604');
                    if (account) {
                        await loadAccountDataWithSource(account);
                        addLog('✅ Mode online exécuté', 'success');
                    }
                } catch (error) {
                    addLog(`❌ Erreur online: ${error.message}`, 'error');
                }
            } else {
                addLog('⚠️ loadAccountDataWithSource non défini', 'warning');
            }
        }

        // Test erreur
        async function testErrorLoad() {
            addLog('🧪 Test gestion d\'erreur', 'info');
            
            try {
                addLog('📂 Tentative de chargement d\'un script inexistant...', 'warning');
                await loadScript('fichier-qui-nexiste-pas.js');
            } catch (error) {
                addLog(`✅ Erreur capturée: ${error.message}`, 'success');
            }
        }

        // Tester un script
        async function testScript(scriptName) {
            addLog(`📂 Test chargement ${scriptName}...`, 'info');
            
            try {
                await loadScript(`../${scriptName}`);
                loadedScripts.push(scriptName);
                addLog(`✅ ${scriptName} chargé avec succès`, 'success');
            } catch (error) {
                addLog(`❌ Erreur chargement ${scriptName}: ${error.message}`, 'error');
            }
            
            updateStats();
        }

        // Tester un fichier data
        async function testDataFile(accountId) {
            const account = ACCOUNTS.find(a => a.id === accountId);
            if (!account) return;
            
            addLog(`📂 Test chargement ${account.dataFile}...`, 'info');
            
            try {
                await loadScript(`../${account.dataFile}`);
                addLog(`✅ Données chargées pour ${account.name}`, 'success');
                
                if (window.CHESS_DATA) {
                    addLog(`📊 ELO: Bullet ${window.CHESS_DATA.elo.bullet.current}`, 'success');
                }
            } catch (error) {
                addLog(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        // Tester un fichier app
        async function testAppFile(accountId) {
            const account = ACCOUNTS.find(a => a.id === accountId);
            if (!account) return;
            
            addLog(`📂 Test chargement ${account.appFile}...`, 'info');
            
            try {
                await loadScript(`../${account.appFile}`);
                addLog(`✅ App chargée pour ${account.name}`, 'success');
            } catch (error) {
                addLog(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        // Afficher le statut des comptes
        function displayAccountsStatus() {
            if (typeof ACCOUNTS === 'undefined') return;
            
            const container = document.getElementById('accountsStatus');
            container.innerHTML = ACCOUNTS.map(account => {
                const statusClass = account.status === 'active' ? 'status-active' : 
                                   (account.status === 'blocked' ? 'status-blocked' : 'status-loading');
                
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #253b47;">
                        <div>
                            <span class="status-indicator ${statusClass}"></span>
                            <strong>${account.name}</strong>
                            <span style="color:#a0b8c7; font-size:0.8rem; margin-left:0.5rem;">${account.id}</span>
                        </div>
                        <div>
                            <span style="color:#6d8f9f;">${account.source || 'manual'}</span>
                            <span style="color:#a0b8c7; margin-left:1rem;">${account.status}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Charger un script
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src + '?t=' + Date.now();
                
                const timeout = setTimeout(() => {
                    reject(new Error('Timeout'));
                }, 5000);
                
                script.onload = () => {
                    clearTimeout(timeout);
                    resolve();
                };
                
                script.onerror = (error) => {
                    clearTimeout(timeout);
                    reject(error);
                };
                
                document.head.appendChild(script);
            });
        }

        // Effacer les logs
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '<div class="log-entry"><span class="timestamp">⏱️</span> Logs effacés</div>';
            logs = [];
            addLog('🧹 Logs effacés', 'info');
        }

        // Nettoyer les scripts chargés
        function clearLoadedScripts() {
            document.querySelectorAll('script[src*="data/"], script[src*="app/"]').forEach(s => s.remove());
            loadedScripts = [];
            delete window.CHESS_DATA;
            addLog('🧹 Scripts nettoyés', 'info');
            updateStats();
        }

        // Exposer les fonctions
        window.testNormalLoad = testNormalLoad;
        window.testOnlineLoad = testOnlineLoad;
        window.testErrorLoad = testErrorLoad;
        window.testScript = testScript;
        window.testDataFile = testDataFile;
        window.testAppFile = testAppFile;
        window.clearLogs = clearLogs;
    </script>
</body>
</html>
