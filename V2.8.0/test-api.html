<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test API Chess.com</title>
    <style>
        body { background: #0b1219; color: #e6edf3; font-family: Inter, sans-serif; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #1e2c34; border-radius: 16px; padding: 2rem; margin-bottom: 1rem; }
        button { background: #82c4a8; color: #0b1219; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        pre { background: #0b1219; padding: 1rem; border-radius: 8px; overflow: auto; }
        .success { color: #82c4a8; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test API Chess.com</h1>
        
        <div class="card">
            <h2>Test avec proxy</h2>
            <input type="text" id="username" value="alpharomo604" placeholder="Nom d'utilisateur">
            <button onclick="testAPI()">Tester</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
    async function testAPI() {
        const username = document.getElementById('username').value;
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = 'Chargement...';
        
        // Test avec différents proxies
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://thingproxy.freeboard.io/fetch/'
        ];
        
        for (const proxy of proxies) {
            try {
                resultDiv.innerHTML += `<br>Tentative avec ${proxy}...`;
                
                const url = `${proxy}${encodeURIComponent(`https://api.chess.com/pub/player/${username}/stats`)}`;
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<div class="success">✅ Succès avec ${proxy}</div>`;
                    resultDiv.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                    return;
                }
            } catch (e) {
                resultDiv.innerHTML += `<div class="error">❌ Échec: ${e.message}</div>`;
            }
        }
        
        resultDiv.innerHTML += '<div class="error">Tous les proxies ont échoué</div>';
    }
    </script>
</body>
</html>
