<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Simple · Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #0b1219;
            font-family: 'Inter', sans-serif;
            color: #e6edf3;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: rgba(22, 34, 43, 0.7);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(130, 196, 168, 0.2);
            margin-bottom: 2rem;
        }
        h1 { color: #82c4a8; margin-bottom: 1rem; }
        input, button {
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #354f5c;
            background: #1e2c34;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            margin-right: 0.5rem;
        }
        button {
            background: #82c4a8;
            color: #0b1219;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        pre {
            background: #1a2a33;
            padding: 1rem;
            border-radius: 12px;
            overflow: auto;
            max-height: 400px;
        }
        .success { color: #82c4a8; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-bolt"></i> Test API Simple</h1>
        <div class="card">
            <input type="text" id="username" value="alpharomo604" placeholder="Nom d'utilisateur">
            <button onclick="testAPI()">Tester</button>
            <button onclick="window.location.href='index.html'">← Retour</button>
            <div id="result" style="margin-top: 2rem;"></div>
        </div>
    </div>
    <script>
        async function testAPI() {
            const username = document.getElementById('username').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...';
            
            try {
                const response = await fetch(`https://api.chess.com/pub/player/${username}/stats`);
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<h3 class="success">✅ Succès</h3>';
                    resultDiv.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    resultDiv.innerHTML = `<h3 class="error">❌ Erreur ${response.status}</h3>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<h3 class="error">❌ Erreur CORS: ${error.message}</h3>`;
                resultDiv.innerHTML += '<p>Essaie avec un proxy: <a href="test-api.html">Test avec proxies</a></p>';
            }
        }
    </script>
</body>
</html>
